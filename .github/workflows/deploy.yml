name: deploy

# Build the production image, push it to GHCR, then deploy to gondor over the
# tailnet: render .env from 1Password (op inject), ship compose + .env via scp,
# and podman compose up. The only GitHub secret is OP_SERVICE_ACCOUNT_TOKEN —
# every other credential (tailscale OAuth, deploy SSH key, host key) is loaded
# from the 1Password vault "hamlive-prod" at run time.
#
# Gating: deploys run when a release is published (normally cut by
# release-please, which dispatches this workflow explicitly because
# GITHUB_TOKEN-created releases don't fire `release` triggers), or manually
# via workflow_dispatch. Merges to main no longer deploy.

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: 'Git tag to build and deploy (empty = ref the run targets)'
                required: false
                type: string

concurrency:
    group: production-deploy
    cancel-in-progress: false # queue deploys; never kill one mid-flight

permissions:
    contents: read
    packages: write

env:
    IMAGE: ghcr.io/nkbooth/hamlive-oss
    DEPLOY_TARGET: nick@gondor # user@MagicDNS-name on the tailnet
    DEPLOY_DIR: services/hamlive # relative to the deploy user's $HOME

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.vars.outputs.tag }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - id: vars
              run: |
                  TAG='${{ inputs.tag || github.event.release.tag_name }}'
                  [ -n "$TAG" ] || TAG="sha-${GITHUB_SHA::7}"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Containerfile
                  push: true
                  tags: |
                      ${{ env.IMAGE }}:latest
                      ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || github.ref }}

            - name: Load deploy credentials from 1Password
              uses: 1password/load-secrets-action@v2
              with:
                  export-env: true
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
                  TS_OAUTH_CLIENT_ID: op://hamlive-prod/tailscale-ci/client-id
                  TS_OAUTH_SECRET: op://hamlive-prod/tailscale-ci/client-secret
                  DEPLOY_SSH_KEY: op://hamlive-prod/gondor-deploy/private-key
                  GONDOR_HOST_KEY: op://hamlive-prod/gondor-deploy/host-key

            - uses: 1password/install-cli-action@v1

            - name: Render production .env
              env:
                  OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
              run: |
                  op inject -i deploy/.env.production.tpl -o "$RUNNER_TEMP/.env"
                  echo "IMAGE_TAG=${{ needs.build.outputs.tag }}" >> "$RUNNER_TEMP/.env"
                  chmod 600 "$RUNNER_TEMP/.env"

            - name: Join tailnet
              uses: tailscale/github-action@v3
              with:
                  oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ env.TS_OAUTH_SECRET }}
                  tags: tag:ci

            - name: Configure SSH
              run: |
                  mkdir -p ~/.ssh && chmod 700 ~/.ssh
                  printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  printf '%s\n' "$GONDOR_HOST_KEY" > ~/.ssh/known_hosts

            - name: Ship compose file and .env
              run: |
                  ssh "$DEPLOY_TARGET" "mkdir -p ~/$DEPLOY_DIR"
                  scp deploy/compose.prod.yml "$DEPLOY_TARGET:$DEPLOY_DIR/compose.yml"
                  scp "$RUNNER_TEMP/.env" "$DEPLOY_TARGET:$DEPLOY_DIR/.env"

            - name: Deploy
              run: |
                  ssh "$DEPLOY_TARGET" "cd ~/$DEPLOY_DIR \
                    && podman compose -f compose.yml pull --quiet \
                    && podman compose -f compose.yml up -d \
                    && podman image prune -f"
