---
# hamlive-oss — MIT License. See LICENSE.
#
# This file holds NON-SECRET, structural configuration only.
# All secrets and per-instance values are supplied via environment variables
# (see .env.example) and overlaid onto this config in lib/configLib.js.
#
# Internal name used in logs.
applogname: 'Ham.Live-WebApp'
# Display name shown in the UI (page titles, navbar, footer). Override with the
# APP_NAME environment variable to brand your instance for your club/group.
app_name: 'Ham.Live'

# QRZ.com callsign lookup (optional). Credentials come from QRZ_USERNAME / QRZ_PASSWORD.
# When those are absent, callsign enrichment is skipped.
qrz_version: 1.34
qrz_keep_profile_images: false
qrz_image_host: 'https://s3.amazonaws.com/files.qrz.com'
qrz_auth_endpoint: 'https://xmldata.qrz.com/xml/${qrz_version}/?username=${qrz_username};password=${qrz_password};agent=${applogname}'
qrz_query_endpoint: 'https://xmldata.qrz.com/xml/${qrz_version}/?s=${qrzSessionKey};callsign=${callSign}'

# Reverse-geocoding (optional). Subscription key comes from GEO_KEY.
# When absent, location resolution is skipped. Default endpoint is Azure Maps.
geo_endpoint: 'https://atlas.microsoft.com/search/address/reverse/json?api-version=1.0&subscription-key=${key}&language=en-US&query=${lat},${lon}&number=1'

# flex ops are options which can be changed at runtime, without restarting the app
# (modify the global flexOptions model in the db, or per-user overrides in userProfile).
re_gen_global_flex_ops: false

# Help URL shown for net-control shell commands. Override with CMD_HELP_URL.
cmd_help_url: 'https://github.com/Constant-Digital-Holdings-LLC/hamlive-oss/blob/main/docs/net-admin-commands-reference.md'

# Ads & analytics are OFF by default in the community edition.
# To enable, set ADS_ENABLED=true / ANALYTICS_ENABLED=true AND supply your own
# provider IDs (ADPLUGG_ACCESS_CODE for ads; PLAUSIBLE_DOMAIN + PLAUSIBLE_SRC or
# GOOGLE_ANALYTICS_ID for analytics — Plausible wins when both are configured).
# See .env.example.
ads_enabled: false
analytics_enabled: false

# --- Secrets below are intentionally NOT stored here. ---
# Supplied via environment variables (see .env.example):
#   MONGODB_URI, COOKIE_SESSION_KEY, MAGIC_LINK_SECRET, BASE_URL
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET   (Google OAuth, optional)
#   SENDGRID_API_KEY                         (email, optional)
#   STREAM_API_KEY, STREAM_API_SECRET        (GetStream chat, optional)
#   QRZ_USERNAME, QRZ_PASSWORD               (callsign lookup, optional)
#   GEO_KEY                                  (reverse geocoding, optional)
